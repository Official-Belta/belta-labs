[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
via_ir = true
optimizer = true
optimizer_runs = 200

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@v4-core/=lib/v4-periphery/lib/v4-core/src/",
    "@v4-periphery/=lib/v4-periphery/src/",
]

# ─── Testnet RPC URLs ─────────────────
[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
unichain_sepolia = "${UNICHAIN_SEPOLIA_RPC_URL}"

# ─── Etherscan Verification ───────────
[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = "sepolia" }
